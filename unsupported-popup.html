<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>大众点评工具箱</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #172126;
        background: #f7faf9;
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 16px;
        font-weight: 780;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 12px;
        color: #667085;
      }

      .links {
        display: grid;
        gap: 8px;
      }

      a {
        display: block;
        padding: 10px 11px;
        border: 1px solid #dfe7e5;
        border-radius: 8px;
        color: #0f766e;
        background: #ffffff;
        font-weight: 720;
        text-decoration: none;
      }

      a:hover {
        border-color: #b8cbc6;
        background: #f9fbfa;
      }
    </style>
  </head>
  <body>
    <h1>未匹配授权链接</h1>
    <p>当前标签页不是已配置的豆包或即梦页面。</p>
    <div class="links">
      <a href="https://www.doubao.com/" target="_blank" rel="noreferrer">豆包</a>
      <a href="https://jimeng.jianying.com/" target="_blank" rel="noreferrer">即梦</a>
    </div>
  </body>
</html>
